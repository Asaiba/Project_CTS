services:
  db:
    image: postgres:16
    container_name: cts-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cts_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cts-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cts_db?schema=public
      JWT_ACCESS_SECRET: replace_with_long_random_access_secret
      JWT_REFRESH_SECRET: replace_with_long_random_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  cts_db_data:
