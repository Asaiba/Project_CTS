<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CTS | Student | Colleges</title>
<link rel="icon" type="image/png" href="/cts_logo.png"/>
<link rel="apple-touch-icon" href="/cts_logo.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#285185",
          secondary: "#D67940",
          accent: "#6F4849",
          "background-light": "#CCD9E2",
          "background-dark": "#0F172A",
          "surface-light": "#FFFFFF",
          "surface-dark": "#1E293B"
        },
        fontFamily: {
          display: ["Outfit", "sans-serif"],
          sans: ["Inter", "sans-serif"]
        }
      }
    }
  };

  function applyTheme(isDark) {
    document.documentElement.classList.toggle("dark", isDark);
  }

  function toggleDarkMode() {
    const isDark = !document.documentElement.classList.contains("dark");
    applyTheme(isDark);
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(savedTheme ? savedTheme === "dark" : prefersDark);
  });
</script>
</head>
<body class="font-sans antialiased bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
<div class="flex min-h-screen">
<aside class="w-72 bg-surface-light dark:bg-surface-dark border-r border-slate-200 dark:border-slate-800 p-6 hidden lg:flex flex-col">
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-lg overflow-hidden bg-transparent flex items-center justify-center"><img alt="CTS Logo" class="w-10 h-10 object-contain" src="../assets/cts_logo.png"/></div>
    <span class="text-xl font-display font-bold text-primary dark:text-white"><a href="../../Index.html">CTS</a> Student</span>
  </div>
  <nav class="space-y-1 flex-1">
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="student-dashboard.html"><span class="material-icons-outlined">dashboard</span>Dashboard</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary dark:bg-slate-800 dark:text-white font-medium" href="student-colleges.html"><span class="material-icons-outlined">school</span>Colleges</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="student-governance.html"><span class="material-icons-outlined">gavel</span>Governance</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="student-applications.html"><span class="material-icons-outlined">history</span>History</a>
  </nav>
  <div class="mt-6 border-t border-slate-200 dark:border-slate-800 pt-4 space-y-2">
    <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800" onclick="toggleDarkMode()">
      <span class="material-icons-outlined dark:hidden">dark_mode</span>
      <span class="material-icons-outlined hidden dark:block">light_mode</span>
      <span>Appearance</span>
    </button>
    <a class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800" href="login.html">
      <span class="material-icons-outlined">logout</span>
      <span>Log Out</span>
    </a>
  </div>
</aside>

<main class="flex-1 p-6 lg:p-10">
  <header class="mb-8">
    <p class="text-sm uppercase tracking-widest text-slate-500 dark:text-slate-400">Student Workspace</p>
    <h1 class="text-3xl font-display font-bold mt-2">Colleges</h1>
    <p class="text-slate-600 dark:text-slate-400 mt-2">This page is now available as part of the student dashboard flow.</p>
  </header>

  <section class="bg-surface-light dark:bg-surface-dark p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold">Registered Institutions</h2>
      <p class="text-xs text-slate-500 dark:text-slate-400" id="institutions-count">Loading...</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="institutions-grid">
      <div class="text-sm text-slate-500 dark:text-slate-400">Loading institutions...</div>
    </div>
  </section>
</main>
</div>
<script type="module">
  import { API_BASE_URL } from "../js/config.js";
  import { logoutAndRedirect, refreshSessionToken, requireSession } from "../js/session.js";
  requireSession({ roles: ["student"] });

  const institutionsGrid = document.getElementById("institutions-grid");
  const institutionsCount = document.getElementById("institutions-count");
  const apiOrigin = (() => {
    try {
      return new URL(API_BASE_URL).origin;
    } catch (_error) {
      return "http://localhost:4000";
    }
  })();

  const shortAddress = (address) => {
    if (!address) return "No wallet";
    return address.length > 12 ? `${address.slice(0, 6)}...${address.slice(-4)}` : address;
  };

  const normalizeLogo = (logoUrl) => {
    if (!logoUrl) return "";
    if (logoUrl.startsWith("/uploads/")) return `${apiOrigin}${logoUrl}`;
    return logoUrl;
  };

  const fallbackLogo = (name) => {
    const initials = (name || "U").slice(0, 2).toUpperCase();
    return `<div class="w-14 h-14 rounded-xl bg-primary/10 text-primary font-bold flex items-center justify-center">${initials}</div>`;
  };

  const statusPill = (status) => {
    if (status === "approved") return '<span class="px-2 py-1 text-[11px] font-bold rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400">APPROVED</span>';
    if (status === "rejected") return '<span class="px-2 py-1 text-[11px] font-bold rounded-full bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400">REJECTED</span>';
    if (status === "pending") return '<span class="px-2 py-1 text-[11px] font-bold rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400">PENDING</span>';
    return "";
  };

  const card = (college, latestApplication, applicationCount = 0) => `
    <article class="rounded-xl border border-slate-200 dark:border-slate-800 p-4 bg-white dark:bg-slate-900/60">
      <div class="flex items-center gap-3 mb-3">
        ${college.logoUrl
          ? `<img src="${normalizeLogo(college.logoUrl)}" alt="${college.username} logo" class="w-14 h-14 rounded-xl object-cover border border-slate-200 dark:border-slate-700" onerror="this.onerror=null;this.src='../assets/l1.png';this.classList.remove('object-cover');this.classList.add('object-contain','p-1');"/>`
          : fallbackLogo(college.username)}
        <div class="min-w-0">
          <p class="font-bold text-slate-900 dark:text-white truncate">${college.username}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400 truncate">${college.email}</p>
        </div>
      </div>
      <p class="text-xs font-mono text-slate-500 dark:text-slate-400">${shortAddress(college.walletAddress)}</p>
      <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">Applications sent: ${applicationCount}</p>
      <div class="mt-3 flex items-center justify-between gap-3">
        ${statusPill(latestApplication?.status)}
        <button class="apply-btn px-3 py-1.5 rounded-lg text-xs font-semibold bg-primary text-white hover:opacity-90" data-college-id="${college.id}">
          ${applicationCount > 0 ? "Apply Again" : "Apply"}
        </button>
      </div>
    </article>
  `;

  const authFetch = async (path, options = {}, retry = true) => {
    let token = localStorage.getItem("cts_access_token") || "";
    let response;
    try {
      response = await fetch(`${API_BASE_URL}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
          ...(options.headers || {}),
        },
      });
    } catch (_networkError) {
      throw new Error("Cannot reach backend API. Ensure backend is running on port 4000.");
    }
    if (response.status === 401 && retry) {
      token = await refreshSessionToken();
      if (!token) {
        logoutAndRedirect("login.html");
        throw new Error("Session expired");
      }
      return authFetch(path, options, false);
    }
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data?.message || "Request failed");
    return data;
  };

  const loadInstitutions = async () => {
    try {
      const [collegesData, myApplicationsData] = await Promise.all([
        authFetch("/users/colleges"),
        authFetch("/applications/mine"),
      ]);
      const items = collegesData.items || [];
      const appsByCollegeId = new Map();
      for (const item of myApplicationsData.items || []) {
        const id = item?.college?.id;
        if (!id) continue;
        if (!appsByCollegeId.has(id)) appsByCollegeId.set(id, []);
        appsByCollegeId.get(id).push(item);
      }
      institutionsCount.textContent = `${items.length} institutions`;
      institutionsGrid.innerHTML = items.length
        ? items
            .map((college) => {
              const collegeApps = appsByCollegeId.get(college.id) || [];
              const latestApplication = collegeApps[0] || null;
              return card(college, latestApplication, collegeApps.length);
            })
            .join("")
        : '<div class="text-sm text-slate-500 dark:text-slate-400">No institutions available.</div>';

      institutionsGrid.querySelectorAll(".apply-btn").forEach((button) => {
        button.addEventListener("click", async () => {
          const collegeId = button.getAttribute("data-college-id");
          if (!collegeId) return;
          const previousText = button.textContent;
          button.disabled = true;
          button.textContent = "Submitting...";
          try {
            const title = (window.prompt("Enter funding title:", "") || "").trim();
            if (!title) {
              button.disabled = false;
              button.textContent = previousText;
              return;
            }
            const description = (window.prompt("Enter funding description:", "") || "").trim();
            if (!description) {
              button.disabled = false;
              button.textContent = previousText;
              return;
            }
            await authFetch("/applications", {
              method: "POST",
              body: JSON.stringify({
                collegeId,
                title,
                description,
                message: title,
              }),
            });
            await loadInstitutions();
          } catch (error) {
            button.disabled = false;
            button.textContent = previousText;
            const rawMessage = error?.message || "Failed to apply.";
            const friendlyMessage = rawMessage === "Failed to fetch"
              ? "Cannot reach backend API. Ensure backend is running on port 4000."
              : rawMessage;
            alert(friendlyMessage);
          }
        });
      });
    } catch (error) {
      const rawMessage = error?.message || "Failed to load institutions.";
      const friendlyMessage = rawMessage === "Failed to fetch"
        ? "Cannot reach backend API. Ensure backend is running on port 4000."
        : rawMessage;
      institutionsGrid.innerHTML = `<div class="text-sm text-red-600 dark:text-red-400">${friendlyMessage}</div>`;
      institutionsCount.textContent = "Unavailable";
    }
  };

  loadInstitutions();
</script></body>
</html>
