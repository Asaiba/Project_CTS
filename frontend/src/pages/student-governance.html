<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CTS | Student | Governance</title>
<link rel="icon" type="image/png" href="/cts_logo.png?v=2"/>
<link rel="apple-touch-icon" href="/cts_logo.png?v=2"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#285185",
          secondary: "#D67940",
          accent: "#6F4849",
          "background-light": "#CCD9E2",
          "background-dark": "#0F172A",
          "surface-light": "#FFFFFF",
          "surface-dark": "#1E293B"
        },
        fontFamily: {
          display: ["Outfit", "sans-serif"],
          sans: ["Inter", "sans-serif"]
        }
      }
    }
  };

  function applyTheme(isDark) {
    document.documentElement.classList.toggle("dark", isDark);
  }

  function toggleDarkMode() {
    const isDark = !document.documentElement.classList.contains("dark");
    applyTheme(isDark);
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(savedTheme ? savedTheme === "dark" : prefersDark);
  });
</script>
</head>
<body class="font-sans antialiased bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
<div class="flex min-h-screen">
<aside class="w-72 bg-surface-light dark:bg-surface-dark border-r border-slate-200 dark:border-slate-800 p-6 hidden lg:flex flex-col">
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-lg overflow-hidden bg-transparent flex items-center justify-center"><img alt="CTS Logo" class="w-10 h-10 object-contain" src="../assets/cts_logo.png"/></div>
    <span class="text-xl font-display font-bold text-primary dark:text-white"><a href="../../Index.html">CTS</a> Student</span>
  </div>
  <nav class="space-y-1 flex-1">
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="student-dashboard.html"><span class="material-icons-outlined">dashboard</span>Dashboard</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="student-colleges.html"><span class="material-icons-outlined">school</span>Colleges</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary dark:bg-slate-800 dark:text-white font-medium" href="student-governance.html"><span class="material-icons-outlined">gavel</span>Governance</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="student-applications.html"><span class="material-icons-outlined">history</span>History</a>
  </nav>
  <div class="mt-6 border-t border-slate-200 dark:border-slate-800 pt-4 space-y-2">
    <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800" onclick="toggleDarkMode()">
      <span class="material-icons-outlined dark:hidden">dark_mode</span>
      <span class="material-icons-outlined hidden dark:block">light_mode</span>
      <span>Appearance</span>
    </button>
    <a class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800" href="login.html">
      <span class="material-icons-outlined">logout</span>
      <span>Log Out</span>
    </a>
  </div>
</aside>

<main class="flex-1 p-6 lg:p-10">
  <header class="mb-8">
    <p class="text-sm uppercase tracking-widest text-slate-500 dark:text-slate-400">Student Workspace</p>
    <h1 class="text-3xl font-display font-bold mt-2">DAO Offer Selection</h1>
    <p class="text-slate-600 dark:text-slate-400 mt-2">After voting closes, choose the DAO offer amount and wallet you prefer to work with.</p>
  </header>

  <section class="bg-surface-light dark:bg-surface-dark p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm mb-6">
    <div class="flex items-center justify-between gap-2">
      <h2 class="text-xl font-bold">My On-Chain Proposals</h2>
      <p class="text-xs text-slate-500 dark:text-slate-400" id="student-governance-wallet">Wallet: --</p>
    </div>
    <p id="student-governance-status" class="text-sm min-h-5 mt-3"></p>
    <div class="space-y-4 mt-4" id="student-governance-list">
      <p class="text-sm text-slate-500 dark:text-slate-400">Loading proposals...</p>
    </div>
  </section>
</main>
</div>
<script type="module">
  import {
    chooseDaoOfferOnChain,
    formatEth,
    getConnectedAddress,
    getProposalMetadata,
    listDaoOffersOnChain,
    listProposalsOnChain,
    withdrawScholarshipOnChain,
  } from "../js/cts-contract.js";
  import { requireSession } from "../js/session.js";
  requireSession({ roles: ["student"] });

  const statusEl = document.getElementById("student-governance-status");
  const listEl = document.getElementById("student-governance-list");
  const walletEl = document.getElementById("student-governance-wallet");
  let viewerWallet = "";

  const setStatus = (message, isError = false) => {
    if (!statusEl) return;
    statusEl.textContent = message || "";
    statusEl.className = `text-sm min-h-5 mt-3 ${isError ? "text-red-600 dark:text-red-400" : "text-green-600 dark:text-green-400"}`;
  };

  const short = (address) =>
    address && address.length > 12 ? `${address.slice(0, 6)}...${address.slice(-4)}` : address || "N/A";

  const renderOffer = (proposalId, offer, canChoose) => `
    <div class="flex items-center justify-between p-3 rounded-lg border border-slate-200 dark:border-slate-700">
      <div>
        <p class="text-sm font-semibold">${short(offer.daoWallet)}</p>
        <p class="text-xs text-slate-500">${offer.amountEth} ETH ${offer.isSelected ? "(selected)" : ""}</p>
      </div>
      <button class="choose-offer-btn px-3 py-1.5 rounded text-xs font-bold ${canChoose && !offer.isSelected ? "bg-primary text-white hover:bg-primary/90" : "bg-slate-200 text-slate-500 cursor-not-allowed"}"
        data-proposal-id="${proposalId}" data-dao-wallet="${offer.daoWallet}" ${canChoose && !offer.isSelected ? "" : "disabled"}>
        ${offer.isSelected ? "Selected" : "Choose"}
      </button>
    </div>
  `;

  const renderProposal = (proposal) => `
    <article class="p-4 rounded-xl border border-slate-200 dark:border-slate-700">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <p class="font-bold">Proposal #${proposal.id} - ${proposal.title}</p>
        <span class="text-xs px-2 py-1 rounded ${proposal.ready ? "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400" : "bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400"}">
          ${proposal.stateText}
        </span>
      </div>
      <p class="text-sm text-slate-500 mt-1">${proposal.description}</p>
      <p class="text-xs text-slate-500 mt-2">Requested: ${proposal.requestedAmountEth} ETH | YES: ${proposal.votesFor} | NO: ${proposal.votesAgainst}</p>
      <div class="mt-3 space-y-2">
        ${(proposal.offers || []).length
          ? proposal.offers.map((offer) => renderOffer(proposal.id, offer, proposal.canChoose)).join("")
          : '<p class="text-sm text-slate-500">No DAO offers submitted yet.</p>'}
      </div>
      <div class="mt-3 flex justify-end">
        <button class="withdraw-scholarship-btn px-3 py-1.5 rounded text-xs font-bold ${proposal.canWithdraw ? "bg-emerald-600 text-white hover:bg-emerald-500" : "bg-slate-200 text-slate-500 cursor-not-allowed"}"
          data-proposal-id="${proposal.id}" ${proposal.canWithdraw ? "" : "disabled"}>
          Withdraw Funds
        </button>
      </div>
    </article>
  `;

  const load = async () => {
    try {
      setStatus("");
      viewerWallet = await getConnectedAddress();
      if (walletEl) walletEl.textContent = `Wallet: ${short(viewerWallet)}`;
      const proposalsRaw = await listProposalsOnChain({ maxItems: 100, viewerAddress: viewerWallet });
      const mine = proposalsRaw.filter((p) => (p.student || "").toLowerCase() === viewerWallet.toLowerCase());

      const hydrated = await Promise.all(mine.map(async (p) => {
        const offersRaw = await listDaoOffersOnChain(p.id);
        const offers = await Promise.all(offersRaw.map(async (o) => ({
          ...o,
          amountEth: await formatEth(o.amountWei),
        })));
        const selectedExists = p.selectedDao && p.selectedDao !== "0x0000000000000000000000000000000000000000";
        const passed = Number(p.votesFor) > Number(p.votesAgainst);
        const ready = p.hasEnded && passed && !p.cancelled && !p.executed;
        const canChoose = ready && !selectedExists;
        const canWithdraw = Boolean(p.isFunded) && BigInt(p.pendingPayoutWei || 0n) > 0n;
        return {
          ...p,
          title: getProposalMetadata(p.id)?.title || "Untitled Funding",
          description: getProposalMetadata(p.id)?.description || "No funding description provided.",
          requestedAmountEth: await formatEth(p.amountWei),
          offers,
          canChoose,
          canWithdraw,
          ready,
          stateText: selectedExists
            ? (canWithdraw ? "Funds available to withdraw" : (p.isFunded ? "Funded" : "Selected - awaiting funding"))
            : (ready ? "Ready for your selection" : "Not ready"),
        };
      }));

      if (!hydrated.length) {
        listEl.innerHTML = '<p class="text-sm text-slate-500 dark:text-slate-400">No proposals found for your student wallet.</p>';
        return;
      }

      listEl.innerHTML = hydrated.map(renderProposal).join("");
    } catch (error) {
      setStatus(error?.message || "Failed to load student governance.", true);
      listEl.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Could not load proposals.</p>';
    }
  };

  listEl?.addEventListener("click", async (event) => {
    const btn = event.target.closest(".choose-offer-btn");
    const withdrawBtn = event.target.closest(".withdraw-scholarship-btn");
    if (btn) {
      const proposalId = btn.getAttribute("data-proposal-id");
      const daoWallet = btn.getAttribute("data-dao-wallet");
      if (!proposalId || !daoWallet) return;
      const confirmed = window.confirm(`Choose DAO wallet ${short(daoWallet)} for proposal #${proposalId}?`);
      if (!confirmed) return;
      try {
        btn.disabled = true;
        setStatus("Submitting selection on-chain...");
        const txHash = await chooseDaoOfferOnChain({ proposalId, daoWallet });
        setStatus(`DAO offer selected. Tx: ${txHash.slice(0, 10)}...`);
        await load();
      } catch (error) {
        btn.disabled = false;
        setStatus(error?.message || "Failed to choose DAO offer.", true);
      }
      return;
    }

    if (withdrawBtn) {
      const proposalId = withdrawBtn.getAttribute("data-proposal-id");
      if (!proposalId) return;
      const confirmed = window.confirm(`Withdraw funded amount for proposal #${proposalId} to your wallet now?`);
      if (!confirmed) return;
      try {
        withdrawBtn.disabled = true;
        setStatus("Submitting withdrawal on-chain...");
        const txHash = await withdrawScholarshipOnChain(proposalId);
        setStatus(`Funds withdrawn. Tx: ${txHash.slice(0, 10)}...`);
        await load();
      } catch (error) {
        withdrawBtn.disabled = false;
        setStatus(error?.message || "Failed to withdraw scholarship.", true);
      }
    }
  });

  load();
</script>
</body>
</html>
