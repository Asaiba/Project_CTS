services:
  - type: pserv
    name: cts-db
    plan: free
    ipAllowList: []
    postgresMajorVersion: "16"

  - type: web
    name: cts-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cts-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ETH_RPC_URL
        sync: false
      - key: CTS_CONTRACT_ADDRESS
        sync: false
      - key: CTS_OWNER_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: no-reply@cts.local
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: cts-uploads
      mountPath: /var/data
      sizeGB: 1
